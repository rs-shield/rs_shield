[advisories]
yanked = "warn"
unmaintained = "transitive"
unsound = "none"
ignore = [
    "RUSTSEC-2021-0119",
    "RUSTSEC-2020-0168",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2026-0104",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0416"


]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-3-Clause-Clear",
    "ISC",
    "Zlib",
    "OpenSSL",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",                  
    "CDLA-Permissive-2.0",
    "NCSA",
]

[bans]
multiple-versions = "warn"
highlight = "all"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]