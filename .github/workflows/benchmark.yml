name: Benchmarks

on:
  push:
    branches: [ main, develop ]
    paths: ['rsb-core/src/core/**', 'rsb-core/benches/**', 'Cargo.toml']
  pull_request:
    branches: [ main ]
    paths: ['rsb-core/src/core/**', 'rsb-core/benches/**', 'Cargo.toml']

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
    steps:
      - uses: actions/checkout@v6
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev pkg-config \
            libglib2.0-dev libglib2.0-0 \
            libgtk-3-dev libgdk-pixbuf-2.0-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev
      
      - name: Run benchmarks
        run: cargo bench --package rsb-core --bench '*' -- --output-format bencher | tee output.txt
        continue-on-error: true
      
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        if: always()
        with:
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
        continue-on-error: true
