name: MSRV Check

on:
  push:
    branches: [ main, develop ]
    paths: ['Cargo.toml', 'Cargo.lock', 'rsb-*/**']
  pull_request:
    branches: [ main, develop ]
    paths: ['Cargo.toml', 'Cargo.lock', 'rsb-*/**']

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: Check MSRV (Minimum Supported Rust Version)
    runs-on: ubuntu-latest
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
    steps:
      - uses: actions/checkout@v6
      
      # Test with the MSRV (defined in Cargo.toml)
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev pkg-config \
            libglib2.0-dev libglib2.0-0 \
            libgtk-3-dev libgdk-pixbuf-2.0-dev \
            libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev
      
      - name: Test with MSRV
        run: cargo test --workspace
      
      - name: Build with MSRV
        run: cargo build --release --workspace
